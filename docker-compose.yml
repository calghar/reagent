version: "3.9"

services:
  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ~/.reagent:/home/app/.reagent
      # Mount your local repos for analysis (optional).
      # Set REAGENT_REPOS_PATH in your .env or environment, or edit this path.
      # Example: ~/Development/my-projects
      - ${REAGENT_REPOS_PATH:-~/repos}:/home/app/repos:ro
    env_file:
      - path: .env
        required: false
    environment:
      - REAGENT_DB_PATH=/home/app/.reagent/reagent.db
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - OLLAMA_HOST=${OLLAMA_HOST:-}
    restart: unless-stopped
