name: AgentGuard Asset Check
on:
  push:
    paths:
      - '.claude/**'
      - '.cursorrules'
      - 'AGENTS.md'
  pull_request:
    paths:
      - '.claude/**'
      - 'AGENTS.md'

jobs:
  agentguard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: AgentGuard asset check
        uses: ./  # replace with owner/repo@v1 once published
        with:
          mode: suggest
          threshold: '60'
          security: 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
